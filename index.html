<!doctype html>
<html lang="tr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArduMind - Arduino'yu Anlayarak Öğren</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }
    
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    
    .glow-animation {
      animation: glow 2s ease-in-out infinite;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-900 text-slate-100">
  <div id="app" class="h-full w-full"></div>
  <script>
    let currentUser = null;
    let showAuthModal = false;
    let authMode = 'login'; // 'login' or 'register'

    // LocalStorage yardımcı fonksiyonlar
    function getUsers() {
      const users = localStorage.getItem('ardumind_users');
      return users ? JSON.parse(users) : [];
    }

    function saveUser(userData) {
      const users = getUsers();
      users.push(userData);
      localStorage.setItem('ardumind_users', JSON.stringify(users));
    }

    function getCurrentUser() {
      const user = localStorage.getItem('ardumind_current_user');
      return user ? JSON.parse(user) : null;
    }

    function setCurrentUser(user) {
      localStorage.setItem('ardumind_current_user', JSON.stringify(user));
      currentUser = user;
    }

    function logout() {
      localStorage.removeItem('ardumind_current_user');
      currentUser = null;
      renderApp();
    }

    function handleLogin(email, password) {
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        setCurrentUser(user);
        showAuthModal = false;
        renderApp();
        showToast('Başarıyla giriş yaptınız! 🎉', 'success');
      } else {
        showToast('E-posta veya şifre hatalı!', 'error');
      }
    }

    function handleRegister(name, email, password, level, goal) {
      const users = getUsers();
      
      if (users.find(u => u.email === email)) {
        showToast('Bu e-posta adresi zaten kayıtlı!', 'error');
        return;
      }

      const newUser = {
        id: Date.now().toString(),
        name,
        email,
        password,
        level,
        goal,
        xp: 0,
        completedModules: [],
        createdAt: new Date().toISOString()
      };

      saveUser(newUser);
      setCurrentUser(newUser);
      showAuthModal = false;
      renderApp();
      showToast('Hoş geldin! Arduino serüvenine başlayalım 🚀', 'success');
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? '#10B981' : type === 'error' ? '#EF4444' : '#3B82F6';
      
      toast.innerHTML = message;
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: ${bgColor};
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        z-index: 10000;
        font-weight: 500;
        animation: slideIn 0.3s ease-out;
      `;
      
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease-out';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function renderApp() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <!-- Navbar -->
        <nav class="sticky top-0 z-50 backdrop-blur-sm bg-slate-800 bg-opacity-90 border-b border-slate-700">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
              <div class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M12 1v6m0 6v10M1 12h6m6 0h10"/>
                  <circle cx="12" cy="12" r="10"/>
                </svg>
                <span class="text-xl font-bold">ArduMind</span>
              </div>
              <div class="hidden md:flex items-center space-x-8">
                <a href="#explore" class="text-slate-200 hover:text-white transition-colors">Keşfet</a>
                <a href="#learning" class="text-slate-200 hover:text-white transition-colors">Öğrenme Yolum</a>
                <a href="#projects" class="text-slate-200 hover:text-white transition-colors">Projeler</a>
                ${currentUser ? `
                  <div class="flex items-center space-x-4">
                    <span class="text-slate-200">Merhaba, ${currentUser.name}!</span>
                    <button onclick="logout()" class="px-6 py-2 rounded-full font-medium bg-slate-700 border border-blue-500 text-slate-200 hover:bg-slate-600 transition-all">
                      Çıkış
                    </button>
                  </div>
                ` : `
                  <button onclick="showAuthModal = true; authMode = 'login'; renderApp();" class="px-6 py-2 rounded-full font-medium bg-blue-500 text-white hover:bg-blue-600 hover:scale-105 hover:shadow-lg transition-all">
                    Giriş / Kayıt
                  </button>
                `}
              </div>
              <button class="md:hidden text-slate-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
              </button>
            </div>
          </div>
        </nav>

        <!-- Hero Section -->
        <section class="relative overflow-hidden py-20">
          <div class="absolute inset-0 opacity-10">
            <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
              <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
                </linearGradient>
              </defs>
              <circle cx="10" cy="10" r="30" fill="url(#grad)" class="glow-animation"/>
              <circle cx="90" cy="90" r="40" fill="url(#grad)" class="float-animation"/>
            </svg>
          </div>
          
          <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="mb-8 float-animation">
              <svg class="w-20 h-20 mx-auto text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
              </svg>
            </div>
            
            <h1 class="text-5xl font-bold mb-6 leading-tight">
              Arduino'yu ezberleyerek değil, anlayarak öğren.
            </h1>
            
            <p class="text-xl mb-8 max-w-3xl mx-auto text-slate-300">
              Yapay zekâ destekli, kişiye özel öğrenme ve hata analizi sistemi
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
              <button class="px-8 py-4 rounded-full font-semibold bg-blue-500 text-white hover:bg-blue-600 hover:scale-105 hover:shadow-xl transition-all w-full sm:w-auto">
                Ücretsiz Başla
              </button>
              <button class="px-8 py-4 rounded-full font-semibold bg-slate-800 text-slate-100 border-2 border-blue-500 hover:scale-105 transition-all w-full sm:w-auto">
                Nasıl Çalışıyor?
              </button>
            </div>
          </div>
        </section>

        <!-- Features Section -->
        <section class="py-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Feature 1 -->
            <div class="bg-slate-800 rounded-3xl p-8 hover:scale-105 hover:shadow-2xl transition-all">
              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-900 flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <h3 class="text-2xl font-bold mb-4">
                Kişiye Özel Öğrenme
              </h3>
              <p class="text-slate-300 leading-relaxed">
                Yapay zekâ senin öğrenme hızına göre yol haritası oluşturur
              </p>
            </div>

            <!-- Feature 2 -->
            <div class="bg-slate-800 rounded-3xl p-8 hover:scale-105 hover:shadow-2xl transition-all">
              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-900 flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
              </div>
              <h3 class="text-2xl font-bold mb-4">
                Akıllı Hata Analizi
              </h3>
              <p class="text-slate-300 leading-relaxed">
                Hatalarını analiz eder ve anlaşılır dille açıklar
              </p>
            </div>

            <!-- Feature 3 -->
            <div class="bg-slate-800 rounded-3xl p-8 hover:scale-105 hover:shadow-2xl transition-all">
              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-900 flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                </svg>
              </div>
              <h3 class="text-2xl font-bold mb-4">
                Proje Tabanlı Eğitim
              </h3>
              <p class="text-slate-300 leading-relaxed">
                Gerçek projeler yaparak Arduino'yu öğren
              </p>
            </div>
          </div>
        </section>

        <!-- CTA Section -->
        <section class="py-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="bg-gradient-to-r from-blue-500 to-blue-900 rounded-3xl p-12 text-center">
            <h2 class="text-4xl font-bold mb-4 text-white">
              Arduino serüvenine başlamaya hazır mısın?
            </h2>
            <p class="text-xl mb-8 text-white opacity-90">
              Binlerce öğrenci gibi sen de bugün başla, yapay zekâ rehberliğinde öğren.
            </p>
            <button class="px-8 py-4 rounded-full font-semibold bg-white text-blue-600 hover:scale-105 hover:shadow-xl transition-all">
              Hemen Ücretsiz Başla →
            </button>
          </div>
        </section>

        <!-- Footer -->
        <footer class="bg-slate-800 border-t border-slate-700 py-12 mt-20">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="flex items-center justify-center space-x-2 mb-4">
              <svg class="w-6 h-6 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v6m0 6v10M1 12h6m6 0h10"/>
                <circle cx="12" cy="12" r="10"/>
              </svg>
              <span class="text-lg font-bold">ArduMind</span>
            </div>
            <p class="text-sm text-slate-400">
              © 2024 ArduMind. Arduino'yu anlayarak öğrenmenin yeni yolu.
            </p>
          </div>
        </footer>

        <!-- Auth Modal -->
        ${showAuthModal ? `
          <div onclick="if(event.target === this) { showAuthModal = false; renderApp(); }" style="position: fixed; inset: 0; background-color: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 16px;">
            <div class="bg-slate-800 rounded-3xl max-w-md w-full p-10 shadow-2xl">
              <div class="text-center mb-8">
                <svg class="w-12 h-12 mx-auto mb-4 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M12 1v6m0 6v10M1 12h6m6 0h10"/>
                  <circle cx="12" cy="12" r="10"/>
                </svg>
                <h2 class="text-2xl font-bold mb-2">
                  ${authMode === 'login' ? 'Giriş Yap' : 'Kayıt Ol'}
                </h2>
                <p class="text-slate-400">
                  ${authMode === 'login' ? 'Hesabına giriş yap ve öğrenmeye devam et' : 'Yeni hesap oluştur ve Arduino serüvenine başla'}
                </p>
              </div>

              <form id="authForm" onsubmit="event.preventDefault(); handleAuthSubmit();">
                ${authMode === 'register' ? `
                  <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium text-slate-300">Ad Soyad</label>
                    <input id="name" type="text" required class="w-full px-4 py-3 rounded-xl bg-slate-900 text-slate-100 border border-slate-700 focus:border-blue-500 focus:outline-none" placeholder="Adınız Soyadınız">
                  </div>
                ` : ''}

                <div class="mb-4">
                  <label class="block mb-2 text-sm font-medium text-slate-300">E-posta</label>
                  <input id="email" type="email" required class="w-full px-4 py-3 rounded-xl bg-slate-900 text-slate-100 border border-slate-700 focus:border-blue-500 focus:outline-none" placeholder="ornek@email.com">
                </div>

                <div class="mb-4">
                  <label class="block mb-2 text-sm font-medium text-slate-300">Şifre</label>
                  <input id="password" type="password" required class="w-full px-4 py-3 rounded-xl bg-slate-900 text-slate-100 border border-slate-700 focus:border-blue-500 focus:outline-none" placeholder="••••••••">
                </div>

                ${authMode === 'register' ? `
                  <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium text-slate-300">Arduino Seviyem</label>
                    <select id="level" required class="w-full px-4 py-3 rounded-xl bg-slate-900 text-slate-100 border border-slate-700 focus:border-blue-500 focus:outline-none">
                      <option value="">Seçiniz</option>
                      <option value="beginner">Hiç bilmiyorum</option>
                      <option value="basic">Temel seviye</option>
                      <option value="intermediate">Orta seviye</option>
                    </select>
                  </div>

                  <div class="mb-6">
                    <label class="block mb-2 text-sm font-medium text-slate-300">Hedefim</label>
                    <select id="goal" required class="w-full px-4 py-3 rounded-xl bg-slate-900 text-slate-100 border border-slate-700 focus:border-blue-500 focus:outline-none">
                      <option value="">Seçiniz</option>
                      <option value="project">Proje yapmak</option>
                      <option value="competition">Yarışmaya hazırlanmak</option>
                      <option value="learn">Öğrenmek için</option>
                      <option value="hobby">Hobi olarak</option>
                    </select>
                  </div>
                ` : '<div class="mb-6"></div>'}

                <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 hover:scale-105 transition-all">
                  ${authMode === 'login' ? 'Giriş Yap' : 'Kayıt Ol'}
                </button>
              </form>

              <div class="text-center mt-6">
                <button onclick="authMode = authMode === 'login' ? 'register' : 'login'; renderApp();" class="text-blue-400 text-sm font-medium hover:underline">
                  ${authMode === 'login' ? 'Hesabın yok mu? Kayıt ol' : 'Zaten hesabın var mı? Giriş yap'}
                </button>
              </div>
            </div>
          </div>
        ` : ''}
      `;
    }

    function handleAuthSubmit() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (authMode === 'login') {
        handleLogin(email, password);
      } else {
        const name = document.getElementById('name').value;
        const level = document.getElementById('level').value;
        const goal = document.getElementById('goal').value;
        handleRegister(name, email, password, level, goal);
      }
    }

    // Sayfa yüklendiğinde mevcut kullanıcıyı kontrol et
    currentUser = getCurrentUser();
    renderApp();
  </script>

</html>
