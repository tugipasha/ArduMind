<!doctype html>
<html lang="tr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArduMind - Arduino'yu Anlayarak Öğren</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    
    .glow-animation {
      animation: glow 2s ease-in-out infinite;
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    
    .led-on {
      filter: drop-shadow(0 0 10px currentColor);
      animation: glow 1s ease-in-out infinite;
    }
    
    .led-blink {
      animation: blink 1s infinite;
    }

    /* Code editor styles */
    .code-editor {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      tab-size: 2;
    }

    .code-line {
      display: flex;
      padding: 2px 0;
    }

    .line-number {
      user-select: none;
      text-align: right;
      padding-right: 16px;
      color: #64748b;
      min-width: 40px;
    }

    .code-content {
      flex: 1;
      white-space: pre;
      color: #e2e8f0;
    }

    /* Syntax highlighting */
    .keyword { color: #c792ea; font-weight: 500; }
    .function { color: #82aaff; }
    .number { color: #f78c6c; }
    .string { color: #c3e88d; }
    .comment { color: #546e7a; font-style: italic; }
    .type { color: #ffcb6b; }
    
    textarea.code-input {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      tab-size: 2;
      resize: none;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-900 text-slate-100">
  <div id="app" class="h-full w-full overflow-auto"></div>
  <script>
    let currentUser = null;
    let showAuthModal = false;
    let authMode = 'login';
    let currentPage = 'home'; // 'home', 'dashboard', 'profile', 'editor'
    
    // Editor state
    let editorCode = `void setup() {
  pinMode(13, OUTPUT);
}

void loop() {
  digitalWrite(13, HIGH);
  delay(1000);
  digitalWrite(13, LOW);
  delay(1000);
}`;
    let simulationRunning = false;
    let simulationInterval = null;
    let ledStates = {};
    let serialOutput = [];
    let aiChatMessages = [];

    // LocalStorage yardımcı fonksiyonlar
    function getUsers() {
      const users = localStorage.getItem('ardumind_users');
      return users ? JSON.parse(users) : [];
    }

    function saveUser(userData) {
      const users = getUsers();
      users.push(userData);
      localStorage.setItem('ardumind_users', JSON.stringify(users));
    }

    function updateUser(updatedUser) {
      const users = getUsers();
      const index = users.findIndex(u => u.id === updatedUser.id);
      if (index !== -1) {
        users[index] = updatedUser;
        localStorage.setItem('ardumind_users', JSON.stringify(users));
        setCurrentUser(updatedUser);
      }
    }

    function getCurrentUser() {
      const user = localStorage.getItem('ardumind_current_user');
      return user ? JSON.parse(user) : null;
    }

    function setCurrentUser(user) {
      localStorage.setItem('ardumind_current_user', JSON.stringify(user));
      currentUser = user;
    }

    function logout() {
      localStorage.removeItem('ardumind_current_user');
      currentUser = null;
      currentPage = 'home';
      renderApp();
    }

    function navigateTo(page) {
      currentPage = page;
      if (page !== 'editor' && simulationRunning) {
        stopSimulation();
      }
      renderApp();
    }

    function handleLogin(email, password) {
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        setCurrentUser(user);
        showAuthModal = false;
        currentPage = 'dashboard';
        renderApp();
        showToast('Başarıyla giriş yaptınız! 🎉', 'success');
      } else {
        showToast('E-posta veya şifre hatalı!', 'error');
      }
    }

    function handleRegister(name, email, password, level, goal) {
      const users = getUsers();
      
      if (users.find(u => u.email === email)) {
        showToast('Bu e-posta adresi zaten kayıtlı!', 'error');
        return;
      }

      const newUser = {
        id: Date.now().toString(),
        name,
        email,
        password,
        level,
        goal,
        xp: 0,
        completedModules: [],
        currentStreak: 0,
        badges: [],
        lastActivity: new Date().toISOString(),
        weeklyProgress: [30, 45, 60, 40, 70, 55, 80],
        createdAt: new Date().toISOString()
      };

      saveUser(newUser);
      setCurrentUser(newUser);
      showAuthModal = false;
      currentPage = 'dashboard';
      renderApp();
      showToast('Hoş geldin! Arduino serüvenine başlayalım 🚀', 'success');
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? '#10B981' : type === 'error' ? '#EF4444' : '#3B82F6';
      
      toast.innerHTML = message;
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: ${bgColor};
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        z-index: 10000;
        font-weight: 500;
        animation: slideIn 0.3s ease-out;
      `;
      
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease-out';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Code Examples
    const codeExamples = {
      blink: {
        name: "Yanıp Sönen LED",
        code: `void setup() {
  pinMode(13, OUTPUT);
}

void loop() {
  digitalWrite(13, HIGH);
  delay(1000);
  digitalWrite(13, LOW);
  delay(1000);
}`
      },
      ledOn: {
        name: "LED Yakma",
        code: `void setup() {
  pinMode(13, OUTPUT);
  digitalWrite(13, HIGH);
}

void loop() {
  // LED sürekli yanar
}`
      },
      button: {
        name: "Buton Kontrolü",
        code: `void setup() {
  pinMode(13, OUTPUT);
  pinMode(2, INPUT);
}

void loop() {
  int buttonState = digitalRead(2);
  if (buttonState == HIGH) {
    digitalWrite(13, HIGH);
  } else {
    digitalWrite(13, LOW);
  }
}`
      },
      digital: {
        name: "Dijital Pin Okuma",
        code: `void setup() {
  Serial.begin(9600);
  pinMode(2, INPUT);
}

void loop() {
  int value = digitalRead(2);
  Serial.print("Pin 2: ");
  Serial.println(value);
  delay(500);
}`
      },
      analog: {
        name: "Analog Okuma",
        code: `void setup() {
  Serial.begin(9600);
}

void loop() {
  int value = analogRead(A0);
  Serial.print("A0: ");
  Serial.println(value);
  delay(500);
}`
      }
    };

    function loadExample(exampleKey) {
      editorCode = codeExamples[exampleKey].code;
      stopSimulation();
      renderApp();
    }

    function highlightCode(code) {
      const keywords = ['void', 'int', 'float', 'char', 'if', 'else', 'for', 'while', 'return', 'const', 'HIGH', 'LOW', 'INPUT', 'OUTPUT'];
      const functions = ['pinMode', 'digitalWrite', 'digitalRead', 'analogRead', 'analogWrite', 'delay', 'Serial.begin', 'Serial.print', 'Serial.println'];
      
      let highlighted = code;
      
      // Comments
      highlighted = highlighted.replace(/\/\/(.*?)$/gm, '<span class="comment">//$1</span>');
      
      // Strings
      highlighted = highlighted.replace(/"([^"]*)"/g, '<span class="string">"$1"</span>');
      
      // Numbers
      highlighted = highlighted.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
      
      // Keywords
      keywords.forEach(kw => {
        const regex = new RegExp(`\\b(${kw})\\b`, 'g');
        highlighted = highlighted.replace(regex, '<span class="keyword">$1</span>');
      });
      
      // Functions
      functions.forEach(fn => {
        const regex = new RegExp(`\\b(${fn})\\b`, 'g');
        highlighted = highlighted.replace(regex, '<span class="function">$1</span>');
      });
      
      return highlighted;
    }

    function parseArduinoCode(code) {
      // Simple parser for basic Arduino commands
      const lines = code.split('\n');
      const commands = [];
      
      for (let line of lines) {
        line = line.trim();
        
        // pinMode
        const pinModeMatch = line.match(/pinMode\s*\(\s*(\d+)\s*,\s*(OUTPUT|INPUT)\s*\)/);
        if (pinModeMatch) {
          commands.push({ type: 'pinMode', pin: parseInt(pinModeMatch[1]), mode: pinModeMatch[2] });
        }
        
        // digitalWrite
        const digitalWriteMatch = line.match(/digitalWrite\s*\(\s*(\d+)\s*,\s*(HIGH|LOW)\s*\)/);
        if (digitalWriteMatch) {
          commands.push({ type: 'digitalWrite', pin: parseInt(digitalWriteMatch[1]), value: digitalWriteMatch[2] });
        }
        
        // delay
        const delayMatch = line.match(/delay\s*\(\s*(\d+)\s*\)/);
        if (delayMatch) {
          commands.push({ type: 'delay', ms: parseInt(delayMatch[1]) });
        }
        
        // Serial.println
        const serialMatch = line.match(/Serial\.println\s*\(\s*"([^"]*)"\s*\)|Serial\.println\s*\(\s*([^)]+)\s*\)/);
        if (serialMatch) {
          commands.push({ type: 'serial', message: serialMatch[1] || serialMatch[2] });
        }
      }
      
      return commands;
    }

    function runSimulation() {
      if (simulationRunning) {
        stopSimulation();
        return;
      }
      
      simulationRunning = true;
      ledStates = {};
      serialOutput = [];
      
      try {
        const commands = parseArduinoCode(editorCode);
        
        if (commands.length === 0) {
          serialOutput.push({ type: 'error', text: 'Çalıştırılabilir komut bulunamadı!' });
          renderApp();
          simulationRunning = false;
          return;
        }
        
        serialOutput.push({ type: 'info', text: 'Simülasyon başlatıldı...' });
        
        // Initialize pins
        commands.filter(c => c.type === 'pinMode').forEach(cmd => {
          ledStates[cmd.pin] = 'LOW';
        });
        
        let loopCommands = [];
        let inLoop = false;
        
        editorCode.split('\n').forEach(line => {
          if (line.includes('void loop()')) inLoop = true;
          else if (inLoop && line.includes('}')) inLoop = false;
          else if (inLoop) loopCommands.push(line);
        });
        
        let commandIndex = 0;
        const loopParsed = parseArduinoCode(loopCommands.join('\n'));
        
        function executeNextCommand() {
          if (!simulationRunning) return;
          
          if (commandIndex >= loopParsed.length) {
            commandIndex = 0;
          }
          
          const cmd = loopParsed[commandIndex];
          
          if (cmd.type === 'digitalWrite') {
            ledStates[cmd.pin] = cmd.value;
            serialOutput.push({ type: 'info', text: `Pin ${cmd.pin}: ${cmd.value}` });
          } else if (cmd.type === 'serial') {
            serialOutput.push({ type: 'output', text: cmd.message });
          }
          
          renderApp();
          
          commandIndex++;
          
          const nextCmd = loopParsed[commandIndex];
          const delay = (nextCmd && nextCmd.type === 'delay') ? nextCmd.ms : 100;
          
          if (nextCmd && nextCmd.type === 'delay') {
            commandIndex++;
          }
          
          simulationInterval = setTimeout(executeNextCommand, delay);
        }
        
        executeNextCommand();
        
      } catch (error) {
        serialOutput.push({ type: 'error', text: 'Hata: ' + error.message });
        simulationRunning = false;
      }
      
      renderApp();
    }

    function stopSimulation() {
      simulationRunning = false;
      if (simulationInterval) {
        clearTimeout(simulationInterval);
        simulationInterval = null;
      }
      ledStates = {};
      serialOutput.push({ type: 'info', text: 'Simülasyon durduruldu.' });
      renderApp();
    }

    function sendAIMessage(message) {
      if (!message.trim()) return;
      
      aiChatMessages.push({ role: 'user', text: message });
      
      // Simple AI responses based on keywords
      let response = '';
      
      if (message.toLowerCase().includes('hata') || message.toLowerCase().includes('çalışmıyor')) {
        response = 'Kodunuzu kontrol edelim:\n\n1. pinMode() ile pinleri doğru tanımladınız mı?\n2. setup() ve loop() fonksiyonları var mı?\n3. digitalWrite() değerleri HIGH veya LOW mu?\n\nHata mesajını görebilir miyim?';
      } else if (message.toLowerCase().includes('led') || message.toLowerCase().includes('ışık')) {
        response = 'LED kontrolü için:\n\n• pinMode(13, OUTPUT) ile pin çıkış olarak ayarlanır\n• digitalWrite(13, HIGH) LED\'i yakar\n• digitalWrite(13, LOW) LED\'i söndürür\n• delay(1000) 1 saniye bekletir\n\nYanıp sönen LED için HIGH-delay-LOW-delay kullanın!';
      } else if (message.toLowerCase().includes('pin') || message.toLowerCase().includes('digitalWrite')) {
        response = 'Arduino pinleri:\n\n• Dijital pinler: 0-13 arası\n• Analog pinler: A0-A5\n• digitalWrite() dijital çıkış için\n• digitalRead() dijital giriş için\n• analogWrite() PWM için (0-255)\n\nHangi pin ile ilgili yardım istersiniz?';
      } else {
        response = 'Size nasıl yardımcı olabilirim?\n\n• Kod hatalarını açıklayabilirim\n• Arduino komutlarını anlatabilirim\n• Örnek kodlar önerebilirim\n• Projenizle ilgili ipuçları verebilirim\n\nSorunuzu detaylı sorarsanız daha iyi yardımcı olabilirim! 😊';
      }
      
      aiChatMessages.push({ role: 'ai', text: response });
      
      renderApp();
      
      // Scroll to bottom
      setTimeout(() => {
        const chatContainer = document.getElementById('aiChatContainer');
        if (chatContainer) {
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }
      }, 100);
    }

              <div class="flex items-center space-x-2 cursor-pointer" onclick="navigateTo('home')">
                <svg class="w-8 h-8 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M12 1v6m0 6v10M1 12h6m6 0h10"/>
                  <circle cx="12" cy="12" r="10"/>
                </svg>
                <span class="text-xl font-bold">ArduMind</span>
              </div>
              <div class="hidden md:flex items-center space-x-8">
                <a href="#" onclick="navigateTo('home')" class="text-slate-200 hover:text-white transition-colors">Keşfet</a>
                ${currentUser ? `
                  <a href="#" onclick="navigateTo('dashboard')" class="text-slate-200 hover:text-white transition-colors ${currentPage === 'dashboard' ? 'text-blue-400' : ''}">Öğrenme Yolum</a>
                  <a href="#" onclick="navigateTo('editor')" class="text-slate-200 hover:text-white transition-colors ${currentPage === 'editor' ? 'text-blue-400' : ''}">Kod Editörü</a>
                ` : ''}
                <a href="#projects" class="text-slate-200 hover:text-white transition-colors">Projeler</a>
                ${currentUser ? `
                  <div class="flex items-center space-x-4">
                    <button onclick="navigateTo('profile')" class="flex items-center space-x-2 text-slate-200 hover:text-white transition-colors">
                      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-sm font-bold">
                        ${currentUser.name.charAt(0).toUpperCase()}
                      </div>
                      <span>${currentUser.name.split(' ')[0]}</span>
                    </button>
                    <button onclick="logout()" class="px-4 py-2 rounded-lg font-medium bg-slate-700 border border-slate-600 text-slate-200 hover:bg-slate-600 transition-all text-sm">
                      Çıkış
                    </button>

                ` : `
                  <button onclick="showAuthModal = true; authMode = 'login'; renderApp();" class="px-6 py-2 rounded-full font-medium bg-blue-500 text-white hover:bg-blue-600 hover:scale-105 hover:shadow-lg transition-all">
                    Giriş / Kayıt
                  </button>
                `}
              </div>
            </div>
          </div>
        </nav>
      `;
    }

            </div>

            <div class="bg-slate-800 rounded-3xl p-8 hover:scale-105 hover:shadow-2xl transition-all">

                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>

            </div>
          </div>
